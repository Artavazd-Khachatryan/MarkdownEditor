name: Publish

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish KMP artifacts
        run: ./gradlew :markdown-editor:publishAllPublicationsToGitHubPagesRepository

      - name: Deploy to maven-repo branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: maven-repo
          folder: build/maven-repo
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
